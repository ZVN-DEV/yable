name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  install:
    name: Install & cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/core/dist
            packages/react/dist
            packages/vanilla/dist
            packages/themes/dist
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test (Node ${{ matrix.node }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - run: pnpm test:ci

  coverage:
    name: Coverage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - run: pnpm test:coverage

  size:
    name: Size limit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - run: pnpm size

  package-integrity:
    name: Package integrity
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - name: Pack workspace packages
        run: |
          rm -rf .pack
          mkdir -p .pack
          pnpm -r --filter './packages/*' pack --pack-destination ./.pack
      - name: Validate packed manifests and exports
        run: |
          set -euo pipefail
          mkdir -p .pack/unpacked
          for tarball in .pack/*.tgz; do
            pkg_dir=".pack/unpacked/$(basename "$tarball" .tgz)"
            rm -rf "$pkg_dir"
            mkdir -p "$pkg_dir"
            tar -xzf "$tarball" -C "$pkg_dir"
            pkg_json="$pkg_dir/package/package.json"
            node -e '
              const fs = require("fs")
              const path = require("path")
              const [pkgJsonPath, packageRoot] = process.argv.slice(1)
              const pkg = JSON.parse(fs.readFileSync(pkgJsonPath, "utf8"))
              for (const field of ["dependencies", "peerDependencies", "optionalDependencies"]) {
                const entries = Object.entries(pkg[field] || {})
                const leak = entries.find(([, version]) => String(version).includes("workspace:"))
                if (leak) {
                  throw new Error(`${pkg.name} leaks workspace protocol in ${field}: ${leak[0]}=${leak[1]}`)
                }
              }
              const targets = []
              const walk = (value) => {
                if (typeof value === "string") {
                  targets.push(value)
                  return
                }
                if (value && typeof value === "object") {
                  for (const nested of Object.values(value)) walk(nested)
                }
              }
              walk(pkg.exports || {})
              for (const target of targets) {
                const resolved = path.join(packageRoot, target)
                if (!fs.existsSync(resolved)) {
                  throw new Error(`${pkg.name} exports missing file: ${target}`)
                }
                if (/(^|\/)src\/.+\.ts$/.test(target) || (target.endsWith(".ts") && !/\.d\.(c|m)?ts$/.test(target))) {
                  throw new Error(`${pkg.name} exports raw TypeScript artifact: ${target}`)
                }
              }
            ' "$pkg_json" "$pkg_dir/package"
          done
      - name: Assert optional @chenglou/pretext stays out of the main react entry
        run: |
          set -euo pipefail
          # Regression guard for #50: importing @zvndev/yable-react must never
          # pull the optional peer @chenglou/pretext into a consumer's bundle
          # graph. It may only appear in the ./pretext subpath entry.
          for pkg_dir in .pack/unpacked/*yable-react*/package; do
            for entry in dist/index.js dist/index.cjs; do
              if grep -q "@chenglou/pretext" "$pkg_dir/$entry"; then
                echo "ERROR: $entry references @chenglou/pretext — it must live only in dist/pretext.*"
                exit 1
              fi
            done
            if ! grep -q "@chenglou/pretext" "$pkg_dir/dist/pretext.js"; then
              echo "ERROR: dist/pretext.js is missing the @chenglou/pretext import"
              exit 1
            fi
          done

  e2e:
    name: E2E (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/e2e
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high --prod
